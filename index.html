<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webflow Variables Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <h1>Webflow Variables Generator</h1>
        <p class="subtitle">Generate and download a complete Webflow Variables Utility CSV from minimal inputs.</p>

        <form id="generator-form" novalidate>
          <div class="section-head">
            <h2>Colors</h2>
            <div class="row-actions">
              <button type="button" id="add-color">+ Add color</button>
              <button type="button" id="remove-color">− Remove</button>
            </div>
          </div>
          <p class="hint">Add 2 to 5 labeled hex colors.</p>
          <div id="color-list" class="stack"></div>

          <h2>Fonts</h2>
          <p class="hint">Provide 2 required font names and an optional mono font.</p>
          <div class="stack">
            <label class="field">
              <span>Display</span>
              <input id="font-display" type="text" placeholder="e.g. DM Serif Display" required />
            </label>
            <label class="field">
              <span>Body</span>
              <input id="font-body" type="text" placeholder="e.g. DM Sans" required />
            </label>
            <label class="field">
              <span>Mono (optional)</span>
              <input id="font-mono" type="text" placeholder="e.g. IBM Plex Mono" />
            </label>
          </div>

          <h2>Base text size</h2>
          <label class="field">
            <span>Base size (px)</span>
            <input id="base-size" type="number" min="1" step="1" value="16" required />
          </label>

          <p id="preview-count" class="preview">Variables to generate: 0</p>
          <p id="status" class="status" role="status" aria-live="polite"></p>

          <button id="generate-download" type="submit" class="primary">Generate &amp; Download CSV</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
